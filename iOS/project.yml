name: Cabinetfix
options:
  bundleIdPrefix: com.shimondeitel.cabinetfix
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cabinetfix:
    type: application
    platform: iOS
    sources:
      - path: Cabinetfix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabinetfix
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cabinetfix/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CabinetfixTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CabinetfixTests
      - path: Cabinetfix.storekit
    dependencies:
      - target: Cabinetfix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabinetfix.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CabinetfixUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CabinetfixUITests
    dependencies:
      - target: Cabinetfix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabinetfix.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cabinetfix:
    build:
      targets:
        Cabinetfix: all
        CabinetfixTests: [test]
        CabinetfixUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cabinetfix.storekit
    test:
      config: Debug
      storeKitConfiguration: Cabinetfix.storekit
      targets:
        - CabinetfixTests
        - CabinetfixUITests
    archive:
      config: Release
